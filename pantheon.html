  .match-info {
    position: absolute;
    z-index: 3;
    left: 25.55%;
    top: 4.1%;
    width: 66.65%;
    height: 12.1%;
    pointer-events: none;
  }
  .match-date {
    position: absolute;
    top: 8%;
    left: 43%;
    transform: translateX(-50%);
    width: 78%;
    min-width: 220px;
    height: clamp(34px, 5.4vw, 50px);
    border: 2px solid #111;
    border-radius: 8px;
    background: #fff;
    text-align: center;
    font: inherit;
    font-size: clamp(14px, 2.4vw, 20px);
    font-weight: 800;
    color: #111;
    pointer-events: auto;
    padding: 0 12px;
    line-height: normal;
    box-shadow: 0 1px 3px rgba(0,0,0,.18);
  }
  .player-names {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 12%;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .player-name {
    justify-self: center;
    width: 76%;
    min-width: 0;
    height: clamp(31px, 4.7vw, 42px);
    border: 2px solid #111;
    border-radius: 8px;
    background: rgba(255,255,255,.94);
    text-align: center;
    font: inherit;
    font-size: clamp(14px, 2.5vw, 21px);
    font-weight: 850;
    color: #111;
    pointer-events: auto;
  }
  .player-name::placeholder {
    color: #666;
    opacity: 1;
  }

  .score-row {
    position: absolute;
    left: 25.55%;
    width: 66.65%;
    height: 6.35%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    pointer-events: none;
  }
  .player-cell {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
  }
  .control {
    width: 93%;
    display: grid;
    grid-template-columns: 44px 0 minmax(54px, 1fr) 0 44px;
    gap: 3px;
    align-items: center;
  }
  .control button {
    width: 100%;
    aspect-ratio: 1;
    border: 2px solid #111;
    border-radius: 8px;
    background: rgba(255,255,255,.94);
    color: #111;
    font-size: clamp(11px, 1.8vw, 16px);
    font-weight: 800;
    line-height: 1;
    cursor: pointer;
    box-shadow: 0 1px 2px rgba(0,0,0,.25);
  }
  .control button:active {
    transform: translateY(1px) scale(.98);
  }
  .control button.step-one {
    display: none;
  }

  .score {
    width: 100%;
    min-width: 0;
    height: 42px;
    border: 3px solid #111;
    border-radius: 8px;
    background: rgba(255,255,255,.97);
    text-align: center;
    font-size: clamp(18px, 3vw, 28px);
    font-weight: 900;
    color: #111;
  }
  .total {
    position: absolute;
    top: 74.10%;
    left: 25.55%;
    width: 66.65%;
    height: 6.45%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    pointer-events: none;
  }
  .total-value {
    align-self: center;
    justify-self: center;
    width: 52%;
    min-width: 58px;
    height: 44px;
    display: grid;
    place-items: center;
    border: 3px solid #111;
    border-radius: 8px;
    background: rgba(255,255,255,.97);
    font-size: clamp(20px, 3.2vw, 30px);
    font-weight: 900;
    pointer-events: auto;
  }

  /* 원본 이미지 기준 행 위치 */
  .r1 { top: 16.80%; }
  .r2 { top: 23.18%; }
  .r3 { top: 29.49%; }
  .r4 { top: 35.81%; }
  .r5 { top: 42.19%; }
  .r6 { top: 48.57%; }
  .r7 { top: 54.88%; }
  .r8 { top: 61.20%; }
  .r9 { top: 67.51%; }


  .victory {
    position: absolute;
    left: 25.55%;
    width: 66.65%;
    height: 6.85%;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .victory.military { top: 80.60%; }
  .victory.science { top: 87.50%; }
  .victory-cell {
    display: grid;
    place-items: center;
  }
  .victory input {
    appearance: none;
    -webkit-appearance: none;
    width: clamp(38px, 7vw, 58px);
    aspect-ratio: 1;
    margin: 0;
    border: clamp(4px, .7vw, 7px) solid #111;
    background: #fff;
    cursor: pointer;
    position: relative;
  }
  .victory input:checked::after {
    content: "✓";
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    font-size: clamp(28px, 5.5vw, 46px);
    font-weight: 1000;
    line-height: 1;
    color: #111;
  }

  .keypad-backdrop {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,.42);
    opacity: 0;
    visibility: hidden;
    transition: opacity .18s ease, visibility .18s ease;
  }
  .keypad-backdrop.open {
    opacity: 1;
    visibility: visible;
  }
  .score-keypad {
    position: fixed;
    z-index: 101;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 10px 14px calc(14px + env(safe-area-inset-bottom));
    border-radius: 22px 22px 0 0;
    background: #f5f1e8;
    color: #111;
    box-shadow: 0 -10px 30px rgba(0,0,0,.3);
    transform: translateY(105%);
    transition: transform .2s ease;
  }
  .score-keypad.open {
    transform: translateY(0);
  }
  .keypad-handle {
    width: 42px;
    height: 5px;
    margin: 0 auto 10px;
    border-radius: 999px;
    background: #aaa;
  }
  .keypad-title {
    text-align: center;
    font-size: 14px;
    font-weight: 800;
    color: #555;
  }
  .keypad-value {
    margin: 2px 0 12px;
    text-align: center;
    font-size: 42px;
    line-height: 1.1;
    font-weight: 950;
  }
  .keypad-buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 9px;
  }
  .keypad-buttons button {
    min-height: 58px;
    border: 2px solid #111;
    border-radius: 13px;
    background: #fff;
    color: #111;
    font-size: 22px;
    font-weight: 900;
    touch-action: manipulation;
  }
  .keypad-buttons button:active {
    transform: scale(.97);
    background: #e9e9e9;
  }
  .keypad-close {
    width: 100%;
    min-height: 46px;
    margin-top: 10px;
    border: 0;
    border-radius: 12px;
    background: #222;
    color: #fff;
    font-size: 16px;
    font-weight: 850;
  }
  .score.mobile-selected {
    outline: 4px solid #ffbf00;
    outline-offset: 2px;
  }

  @media (max-width: 560px) {
    .control {
      width: 70%;
      grid-template-columns: 1fr !important;
      gap: 0;
    }
    .control button {
      display: none !important;
    }
    .score {
      width: 100%;
      height: 42px;
      font-size: 22px;
      cursor: pointer;
      caret-color: transparent;
    }
    .control button.step-one { display: block; }
    .control {
      width: 96%;
      grid-template-columns: 34px 30px minmax(44px, 1fr) 30px 34px;
      gap: 2px;
    }
    .control button {
      border-width: 1.5px;
      border-radius: 6px;
      font-size: 10px;
    }
    .score {
      height: 34px;
      border-width: 2px;
      border-radius: 6px;
      font-size: 18px;
    }
    .total-value {
      height: 36px;
      border-width: 2px;
      font-size: 21px;
    }
  }
</style>
</head>
<body>
  <main class="app">
    <div class="toolbar">
      <button class="reset" id="resetBtn">전체 초기화</button>
    </div>

    <section class="sheet" aria-label="세븐원더스 듀얼 판테온 점수표">

      <div class="match-info">
        <input class="match-date" id="matchDate" type="text" inputmode="numeric" maxlength="14" placeholder="YYYY. MM. DD." aria-label="경기 날짜">
        <div class="player-names">
          <input class="player-name" id="playerName1" type="text" maxlength="20" placeholder="플레이어 1" aria-label="플레이어 1 이름">
          <input class="player-name" id="playerName2" type="text" maxlength="20" placeholder="플레이어 2" aria-label="플레이어 2 이름">
        </div>
      </div>

      <div id="rows"></div>

      <div class="total">
        <div class="total-value" id="total-0">0</div>
        <div class="total-value" id="total-1">0</div>
      </div>

      <div class="victory military">
        <label class="victory-cell"><input type="checkbox" name="victory" value="p1-military" aria-label="플레이어 1 군사 승리"></label>
        <label class="victory-cell"><input type="checkbox" name="victory" value="p2-military" aria-label="플레이어 2 군사 승리"></label>
      </div>
      <div class="victory science">
        <label class="victory-cell"><input type="checkbox" name="victory" value="p1-science" aria-label="플레이어 1 과학 승리"></label>
        <label class="victory-cell"><input type="checkbox" name="victory" value="p2-science" aria-label="플레이어 2 과학 승리"></label>
      </div>
    </section>
  </main>

  <div class="keypad-backdrop" id="keypadBackdrop"></div>
  <section class="score-keypad" id="scoreKeypad" aria-hidden="true">
    <div class="keypad-handle"></div>
    <div class="keypad-title" id="keypadTitle">점수 입력</div>
    <div class="keypad-value" id="keypadValue">0</div>
    <div class="keypad-buttons">
      <button type="button" data-delta="-3">-3</button>
      <button type="button" data-delta="-1">-1</button>
      <button type="button" data-delta="1">+1</button>
      <button type="button" data-delta="3">+3</button>
    </div>
    <button class="keypad-close" id="keypadClose" type="button">완료</button>
  </section>

<script>
  const rowCount = 9;
  const scores = Array.from({ length: 2 }, () => Array(rowCount).fill(0));
  const rows = document.getElementById("rows");

  function makeControl(player, row) {
    const cell = document.createElement("div");
    cell.className = "player-cell";

    const control = document.createElement("div");
    control.className = "control";

    [-3, -1].forEach(delta => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = String(delta);
      if (Math.abs(delta) === 1) btn.classList.add("step-one");
      btn.setAttribute("aria-label", `플레이어 ${player + 1}, ${row + 1}행 ${delta}점`);
      btn.addEventListener("click", () => change(player, row, delta));
      control.appendChild(btn);
    });

    const input = document.createElement("input");
    input.className = "score";
    input.type = "number";
    input.inputMode = "numeric";
    input.min = "0";
    input.value = "0";
    input.id = `score-${player}-${row}`;
    input.addEventListener("click", (event) => {
      if (mobileQuery.matches) {
        event.preventDefault();
        input.blur();
        openKeypad(player, row);
      }
    });
    input.addEventListener("input", () => {
      const n = Number.parseInt(input.value, 10);
      scores[player][row] = Number.isFinite(n) ? Math.max(0, n) : 0;
      input.value = scores[player][row];
      updateTotal(player);
    });
    control.appendChild(input);

    [1, 3].forEach(delta => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = `+${delta}`;
      if (Math.abs(delta) === 1) btn.classList.add("step-one");
      btn.setAttribute("aria-label", `플레이어 ${player + 1}, ${row + 1}행 +${delta}점`);
      btn.addEventListener("click", () => change(player, row, delta));
      control.appendChild(btn);
    });

    cell.appendChild(control);
    return cell;
  }

  for (let row = 0; row < rowCount; row++) {
    const rowEl = document.createElement("div");
    rowEl.className = `score-row r${row + 1}`;
    rowEl.appendChild(makeControl(0, row));
    rowEl.appendChild(makeControl(1, row));
    rows.appendChild(rowEl);
  }

  function change(player, row, delta) {
    scores[player][row] = Math.max(0, scores[player][row] + delta);
    const input = document.getElementById(`score-${player}-${row}`);
    input.value = scores[player][row];
    updateTotal(player);
  }

  function updateTotal(player) {
    const total = scores[player].reduce((a, b) => a + b, 0);
    document.getElementById(`total-${player}`).textContent = total;
  }


  const matchDate = document.getElementById("matchDate");
  const playerName1 = document.getElementById("playerName1");
  const playerName2 = document.getElementById("playerName2");

  const savedInfo = JSON.parse(localStorage.getItem("sevenWondersDuelPantheonMatchInfo") || "{}");
  const now = new Date();
  const todayText = `${now.getFullYear()}. ${String(now.getMonth() + 1).padStart(2, "0")}. ${String(now.getDate()).padStart(2, "0")}.`;
  matchDate.value = todayText;
  playerName1.value = savedInfo.player1 || "";
  playerName2.value = savedInfo.player2 || "";

  function saveMatchInfo() {
    localStorage.setItem("sevenWondersDuelPantheonMatchInfo", JSON.stringify({
      date: matchDate.value,
      player1: playerName1.value,
      player2: playerName2.value
    }));
  }

  [matchDate, playerName1, playerName2].forEach(input => {
    input.addEventListener("input", saveMatchInfo);
    input.addEventListener("change", saveMatchInfo);
  });

  document.querySelectorAll('input[name="victory"]').forEach(box => {
    box.addEventListener("change", () => {
      if (box.checked) {
        document.querySelectorAll('input[name="victory"]').forEach(other => {
          if (other !== box) other.checked = false;
        });
      }
    });
  });


  const mobileQuery = window.matchMedia("(max-width: 560px)");
  const keypadBackdrop = document.getElementById("keypadBackdrop");
  const scoreKeypad = document.getElementById("scoreKeypad");
  const keypadTitle = document.getElementById("keypadTitle");
  const keypadValue = document.getElementById("keypadValue");
  const keypadClose = document.getElementById("keypadClose");
  let activeScore = null;

  function playerDisplayName(player) {
    const field = player === 0 ? playerName1 : playerName2;
    return field.value.trim() || `플레이어 ${player + 1}`;
  }

  function syncMobileInputs() {
    document.querySelectorAll(".score").forEach(input => {
      input.readOnly = mobileQuery.matches;
      input.inputMode = mobileQuery.matches ? "none" : "numeric";
    });
  }

  function openKeypad(player, row) {
    if (!mobileQuery.matches) return;
    activeScore = { player, row };
    document.querySelectorAll(".score.mobile-selected").forEach(el => el.classList.remove("mobile-selected"));
    const input = document.getElementById(`score-${player}-${row}`);
    input.classList.add("mobile-selected");
    keypadTitle.textContent = `${playerDisplayName(player)} · ${row + 1}번째 항목`;
    keypadValue.textContent = scores[player][row];
    keypadBackdrop.classList.add("open");
    scoreKeypad.classList.add("open");
    scoreKeypad.setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
  }

  function closeKeypad() {
    keypadBackdrop.classList.remove("open");
    scoreKeypad.classList.remove("open");
    scoreKeypad.setAttribute("aria-hidden", "true");
    document.querySelectorAll(".score.mobile-selected").forEach(el => el.classList.remove("mobile-selected"));
    activeScore = null;
    document.body.style.overflow = "";
  }

  document.querySelectorAll(".keypad-buttons button").forEach(button => {
    button.addEventListener("click", () => {
      if (!activeScore) return;
      const delta = Number(button.dataset.delta);
      change(activeScore.player, activeScore.row, delta);
      keypadValue.textContent = scores[activeScore.player][activeScore.row];
      navigator.vibrate?.(15);
    });
  });

  keypadBackdrop.addEventListener("click", closeKeypad);
  keypadClose.addEventListener("click", closeKeypad);
  mobileQuery.addEventListener?.("change", () => {
    syncMobileInputs();
    if (!mobileQuery.matches) closeKeypad();
  });
  syncMobileInputs();

  document.getElementById("resetBtn").addEventListener("click", () => {
    closeKeypad();
    for (let p = 0; p < 2; p++) {
      for (let r = 0; r < rowCount; r++) {
        scores[p][r] = 0;
        document.getElementById(`score-${p}-${r}`).value = 0;
      }
      updateTotal(p);
    }
    document.querySelectorAll('input[name="victory"]').forEach(radio => radio.checked = false);
  });
</script>
</body>
</html>
