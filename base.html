    pointer-events: auto;
    padding: 0 12px;
    line-height: normal;

  }
  .player-names {

    left: 0;
    right: 0;

  }
  .player-name {
    justify-self: center;
    width: 76%;
    min-width: 0;
    height: clamp(31px, 4.7vw, 42px);
    border: 2px solid #111;
    border-radius: 8px;
    background: rgba(255,255,255,.94);
    text-align: center;
    font: inherit;
    font-size: clamp(14px, 2.5vw, 21px);
    font-weight: 850;
    color: #111;
    pointer-events: auto;
  }
  .player-name::placeholder {
    color: #666;
    opacity: 1;
  }

  .score-row {
    position: absolute;
    left: 25.55%;
    width: 66.65%;
    height: 7.05%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    pointer-events: none;
  }
  .player-cell {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
  }
  .control {
    width: 93%;
    display: grid;
    grid-template-columns: 44px minmax(54px, 1fr) 44px;
    gap: 3px;
    align-items: center;
  }
  .control button {
    width: 100%;
    aspect-ratio: 1;
    border: 2px solid #111;
    border-radius: 8px;
    background: rgba(255,255,255,.94);
    color: #111;
    font-size: clamp(11px, 1.8vw, 16px);
    font-weight: 800;
    line-height: 1;

    min-width: 0;
    height: 42px;
    border: 3px solid #111;
    border-radius: 8px;

    font-size: clamp(18px, 3vw, 28px);

    min-width: 58px;

    place-items: center;
    border: 3px solid #111;
    border-radius: 8px;

    font-weight: 900;

  .r1 { top: 16.78%; }
  .r2 { top: 23.84%; }
  .r3 { top: 30.91%; }
  .r4 { top: 37.98%; }
  .r5 { top: 45.05%; }
  .r6 { top: 52.12%; }
  .r7 { top: 59.19%; }
  .r8 { top: 66.26%; }


  .victory {
    position: absolute;
    left: 25.55%;
    width: 66.65%;
    height: 7.05%;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .victory.military { top: 80.05%; }
  .victory.science { top: 87.12%; }
  .victory-cell {
    display: grid;
    place-items: center;
  }
  .victory input {
    appearance: none;
    -webkit-appearance: none;
    width: clamp(38px, 7vw, 58px);
    aspect-ratio: 1;
    margin: 0;
    border: clamp(4px, .7vw, 7px) solid #111;
    background: #fff;
    cursor: pointer;
    position: relative;
  }
  .victory input:checked::after {
    content: "✓";
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    font-size: clamp(28px, 5.5vw, 46px);
    font-weight: 1000;
    line-height: 1;
    color: #111;

  @media (max-width: 560px) {
    .control {
      width: 96%;
      grid-template-columns: 34px minmax(44px, 1fr) 34px;
      gap: 2px;
    }
    .control button {
      border-width: 1.5px;
      border-radius: 6px;
      font-size: 10px;
    }
    .score {
      height: 34px;
      border-width: 2px;
      border-radius: 6px;
      font-size: 18px;
    }
    .total-value {
      height: 36px;
      border-width: 2px;
      font-size: 21px;
    }
  }

<body>
  <main class="app">
    <div class="toolbar">
      <button class="reset" id="resetBtn">전체 초기화</button>
    </div>

    <section class="sheet" aria-label="세븐원더스 듀얼 점수표">

      <div class="match-info">
        <input class="match-date" id="matchDate" type="text" inputmode="numeric" maxlength="14" placeholder="YYYY. MM. DD." aria-label="경기 날짜">
        <div class="player-names">
          <input class="player-name" id="playerName1" type="text" maxlength="20" placeholder="플레이어 1" aria-label="플레이어 1 이름">
          <input class="player-name" id="playerName2" type="text" maxlength="20" placeholder="플레이어 2" aria-label="플레이어 2 이름">
        </div>
      </div>

      <div id="rows"></div>

      <div class="total">
        <div class="total-value" id="total-0">0</div>
        <div class="total-value" id="total-1">0</div>
      </div>

      <div class="victory military">
        <label class="victory-cell"><input type="checkbox" name="victory" value="p1-military" aria-label="플레이어 1 군사 승리"></label>
        <label class="victory-cell"><input type="checkbox" name="victory" value="p2-military" aria-label="플레이어 2 군사 승리"></label>
      </div>
      <div class="victory science">
        <label class="victory-cell"><input type="checkbox" name="victory" value="p1-science" aria-label="플레이어 1 과학 승리"></label>
        <label class="victory-cell"><input type="checkbox" name="victory" value="p2-science" aria-label="플레이어 2 과학 승리"></label>
      </div>
    </section>
  </main>

<script>
  const rowCount = 8;
  const scores = Array.from({ length: 2 }, () => Array(rowCount).fill(0));
  const rows = document.getElementById("rows");

  function makeControl(player, row) {
    const cell = document.createElement("div");
    cell.className = "player-cell";

    const control = document.createElement("div");
    control.className = "control";

    [-3].forEach(delta => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = String(delta);
      btn.setAttribute("aria-label", `플레이어 ${player + 1}, ${row + 1}행 ${delta}점`);
      btn.addEventListener("click", () => change(player, row, delta));
      control.appendChild(btn);
    });

    const input = document.createElement("input");
    input.className = "score";
    input.type = "number";
    input.inputMode = "numeric";
    input.min = "0";
    input.value = "0";
    input.id = `score-${player}-${row}`;
    input.addEventListener("input", () => {
      const n = Number.parseInt(input.value, 10);
      scores[player][row] = Number.isFinite(n) ? Math.max(0, n) : 0;
      input.value = scores[player][row];
      updateTotal(player);
    });
    control.appendChild(input);

    [3].forEach(delta => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = `+${delta}`;
      btn.setAttribute("aria-label", `플레이어 ${player + 1}, ${row + 1}행 +${delta}점`);
      btn.addEventListener("click", () => change(player, row, delta));
      control.appendChild(btn);
    });

    cell.appendChild(control);
    return cell;
  }

  for (let row = 0; row < rowCount; row++) {
    const rowEl = document.createElement("div");
    rowEl.className = `score-row r${row + 1}`;
    rowEl.appendChild(makeControl(0, row));
    rowEl.appendChild(makeControl(1, row));
    rows.appendChild(rowEl);
  }

  function change(player, row, delta) {
    scores[player][row] = Math.max(0, scores[player][row] + delta);
    const input = document.getElementById(`score-${player}-${row}`);
    input.value = scores[player][row];
    updateTotal(player);
  }

  function updateTotal(player) {
    const total = scores[player].reduce((a, b) => a + b, 0);
    document.getElementById(`total-${player}`).textContent = total;
  }


  const matchDate = document.getElementById("matchDate");
  const playerName1 = document.getElementById("playerName1");
  const playerName2 = document.getElementById("playerName2");

  const savedInfo = JSON.parse(localStorage.getItem("sevenWondersDuelMatchInfo") || "{}");
  const now = new Date();
  const todayText = `${now.getFullYear()}. ${String(now.getMonth() + 1).padStart(2, "0")}. ${String(now.getDate()).padStart(2, "0")}.`;
  matchDate.value = savedInfo.date || todayText;
  playerName1.value = savedInfo.player1 || "";
  playerName2.value = savedInfo.player2 || "";

  function saveMatchInfo() {
    localStorage.setItem("sevenWondersDuelMatchInfo", JSON.stringify({
      date: matchDate.value,
      player1: playerName1.value,
      player2: playerName2.value
    }));
  }

  [matchDate, playerName1, playerName2].forEach(input => {
    input.addEventListener("input", saveMatchInfo);
    input.addEventListener("change", saveMatchInfo);
  });

  document.querySelectorAll('input[name="victory"]').forEach(box => {
    box.addEventListener("change", () => {
      if (box.checked) {
        document.querySelectorAll('input[name="victory"]').forEach(other => {
          if (other !== box) other.checked = false;
        });
      }
    });
  });

  document.getElementById("resetBtn").addEventListener("click", () => {
    for (let p = 0; p < 2; p++) {
      for (let r = 0; r < rowCount; r++) {
        scores[p][r] = 0;
        document.getElementById(`score-${p}-${r}`).value = 0;
      }
      updateTotal(p);
    }
    document.querySelectorAll('input[name="victory"]').forEach(radio => radio.checked = false);
  });
</script>
</body>
</html>
